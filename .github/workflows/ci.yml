name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: chat_core_test
          POSTGRES_USER: chat_core
          POSTGRES_PASSWORD: chat_core
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U chat_core -d chat_core_test"
          --health-interval 2s --health-timeout 2s --health-retries 20
    env:
      DATABASE_URL: postgresql://chat_core:chat_core@127.0.0.1:5432/chat_core_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24.11.1
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - run: npm run typecheck
      - run: npm run lint
      - run: npm audit --omit=dev --audit-level=high
      - run: docker run --rm -v "$PWD:/repo" zricethezav/gitleaks:v8.28.0 dir /repo --config=/repo/.gitleaks.toml --no-banner --redact
